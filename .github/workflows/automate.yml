name: Automated Proxy Configuration Update

on:
  # Trigger on push to main branch
  push:
    branches: [ main ]
  
  # Trigger on schedule (every hour at 15 minutes past)
  schedule:
    - cron: '15 * * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-configs:
    runs-on: ubuntu-latest
    
    # Grant necessary permissions
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git operations
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Execute Main Script
        run: |
          echo "Starting proxy configuration update..."
          python main.py
          echo "Script execution completed."
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Check for Changes
        id: check-changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will commit and push"
          fi
      
      - name: Commit and Push Changes
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          git add -A
          git commit -m "Auto-update: $(date '+%Y-%m-%d %H:%M UTC') - Proxy configurations refreshed"
          git push origin main
      
      - name: No Changes Message
        if: steps.check-changes.outputs.has-changes == 'false'
        run: |
          echo "No changes to commit - configurations are up to date" 