name: Automated Proxy Configuration Update (Force Reset)

on:
  # Trigger on schedule (every 2 hours)
  schedule:
    - cron: '0 */2 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-configs:
    runs-on: ubuntu-latest
     
    # Grant necessary permissions
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Execute Main Script
        run: |
          echo "Starting proxy configuration update..."
          python main.py
          echo "Script execution completed."
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Create Fresh Branch
        run: |
          # Create a new orphan branch
          git checkout --orphan temp-branch
          
          # Add all files
          git add -A
          
          # Commit with timestamp
          git commit -m "Auto-update: $(date '+%Y-%m-%d %H:%M UTC') - Fresh proxy configurations"
          
          # Delete old main and rename current branch
          git branch -D main
          git branch -m main
      
      - name: Force Push Changes
        run: |
          # Force push to completely replace history
          git push -f origin main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }} 